services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mathalien
      POSTGRES_USER: mathalien
      POSTGRES_PASSWORD: password123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mathalien -d mathalien"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data: